<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch sử — AI-PROOF</title>
  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <style>
    .timeline-line {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, transparent, var(--accent-primary) 10%, var(--accent-primary) 90%, transparent);
      transform: translateX(-50%);
    }
    .timeline-entry {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      gap: 16px;
      margin-bottom: 32px;
      align-items: start;
    }
    .timeline-dot {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--bg-panel);
      border: 2px solid var(--accent-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: var(--glow-cyan);
      position: relative;
      z-index: 2;
    }
    .timeline-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
    }
    .timeline-entry:nth-child(odd) .timeline-card-left  { opacity: 1; }
    .timeline-entry:nth-child(odd) .timeline-card-right { opacity: 0; pointer-events: none; }
    .timeline-entry:nth-child(even) .timeline-card-left  { opacity: 0; pointer-events: none; }
    .timeline-entry:nth-child(even) .timeline-card-right { opacity: 1; }
  </style>
</head>
<body>
  <nav class="main-nav">
    <div class="nav-logo">AI-PROOF</div>
    <div class="nav-links">
      <a href="index.html">Trang chủ</a>
      <a href="analyze.html">Phân tích</a>
      <a href="fakenews.html">Tin giả</a>
      <a href="url-check.html">Kiểm tra URL</a>
      <a href="timeline.html" class="active">Lịch sử</a>
      <a href="lab.html">Phòng Lab</a>
      <a href="diagnostic.html" style="font-size:0.8rem;color:var(--text-secondary);">Chẩn đoán</a>
    </div>
  </nav>

  <div id="app" class="page" style="padding-top:100px;">
    <div class="container">
      <div class="flex justify-between items-center anim-fadeInDown" style="margin-bottom:40px;flex-wrap:wrap;gap:16px;">
        <div>
          <div class="badge badge-cyan" style="margin-bottom:12px;">◈ Lịch sử Xác minh</div>
          <h1>Lịch sử <span style="color:var(--accent-primary);">Phân tích</span></h1>
          <p style="color:var(--text-secondary);margin-top:8px;">Đă sư theo thời gian có các xác minh và mục nhập blockchain.</p>
        </div>
        <div class="flex gap-sm">
          <button class="btn btn-outline" onclick="exportTimeline()">📥 Export Chain</button>
              <button class="btn btn-ghost"   onclick="importTimeline()">📤 Nhập</button>
              <button class="btn btn-ghost"   onclick="clearTimeline()">🗑 Xóa</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="panel anim-fadeInUp" style="padding:16px 20px;margin-bottom:32px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
        <div class="input-group" style="flex:1;min-width:200px;">
          <input type="text" id="search-filter" class="input-field" placeholder="Tìm kiếm theo hash, phán quyết, ngày..." style="padding:8px 12px;" />
        </div>
        <select id="verdict-filter" class="input-field" style="padding:8px 12px;width:auto;">
          <option value="">All Verdicts</option>
          <option value="AUTHENTIC">Authentic</option>
          <option value="LIKELY REAL">Likely Real</option>
          <option value="UNCERTAIN">Uncertain</option>
          <option value="SUSPICIOUS">Suspicious</option>
          <option value="AI-GENERATED">AI-Generated</option>
        </select>
        <select id="type-filter" class="input-field" style="padding:8px 12px;width:auto;">
          <option value="">All Types</option>
          <option value="text">📝 Text</option>
          <option value="image">🖼️ Image</option>
          <option value="url">🔗 URL Check</option>
          <option value="nft">🎨 NFT</option>
        </select>
      </div>

      <!-- Stats bar -->
      <div id="timeline-stats" style="padding:0 0 16px;"></div>

      <!-- Timeline -->
      <div id="timeline-container" style="position:relative;padding:0 20px;">
        <div class="timeline-line"></div>
        <div id="timeline-entries">
          <!-- Populated by timeline-page.js -->
          <div style="text-align:center;padding:80px;color:var(--text-muted);">
            <div style="font-size:3rem;margin-bottom:16px;">📭</div>
            <div style="font-family:var(--font-display);font-size:0.8rem;">Không có xác minh nào</div>
            <p style="margin-top:8px;font-size:0.85rem;">Chạy phân tích đầu tiên của bạn để bắt đầu xây dựng lịch sử xác minh của bạn.
            <a href="analyze.html" class="btn btn-outline mt-lg">Bắt đầu Phân tích</a>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="flex items-center justify-between hidden mt-xl">
        <button class="btn btn-ghost" id="prev-btn" onclick="prevPage()">← Trước đó</button>
        <span id="page-info" style="font-size:0.8rem;color:var(--text-secondary);"></span>
        <button class="btn btn-ghost" id="next-btn" onclick="nextPage()">Tiếp theo →</button>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/hash.js"></script>
  <script src="assets/js/merkle.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/blockchain.js"></script>
  <script src="assets/js/blockchain-export.js"></script>
  <script src="assets/js/blockchain-import.js"></script>
  <script src="assets/js/ai-explain.js"></script>
  <script src="assets/js/version-compare.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/ai-gemini.js"></script>
  <script src="assets/js/timeline-page.js"></script>
</body>
</html>
